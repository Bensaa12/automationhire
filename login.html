<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Login | AutomationHire</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,230,118,0.06) 0%, transparent 70%),
                  var(--black);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--black-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
      text-decoration: none;
    }
    .login-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .login-logo-text {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
    }
    .login-logo-text span { color: var(--green); }
    .login-heading {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 14px;
      color: var(--white-60);
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--white-60);
      margin-bottom: 7px;
    }
    .form-input {
      width: 100%;
      background: var(--black-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 14px;
      color: var(--white);
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,230,118,0.08);
    }
    .form-input::placeholder { color: var(--white-30); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      color: var(--black);
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-body);
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 4px;
    }
    .login-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .login-divider {
      text-align: center;
      font-size: 13px;
      color: var(--white-30);
      margin: 22px 0 18px;
      position: relative;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 60px);
      height: 1px;
      background: var(--border);
    }
    .login-divider::before { left: 0; }
    .login-divider::after  { right: 0; }
    .login-footer {
      text-align: center;
      font-size: 13px;
      color: var(--white-60);
    }
    .login-footer a { color: var(--green); text-decoration: none; font-weight: 600; }
    .login-footer a:hover { text-decoration: underline; }
    .login-error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 13px;
      color: #f87171;
      margin-bottom: 18px;
      display: none;
    }
    .login-error.show { display: block; }
    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--white-30); cursor: pointer;
      font-size: 16px; padding: 4px;
      transition: color 0.15s;
    }
    .password-toggle:hover { color: var(--white-60); }
  </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<div class="login-wrap">
  <div class="login-card">

    <a href="index.html" class="login-logo">
      <div class="login-logo-icon">⚡</div>
      <div class="login-logo-text">Automation<span>Hire</span></div>
    </a>

    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Sign in to your expert dashboard</p>

    <div id="login-error" class="login-error"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email address</label>
        <input id="login-email" class="form-input" type="email" name="email"
               placeholder="you@company.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="password-wrap">
          <input id="login-password" class="form-input" type="password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required
                 style="padding-right:44px" />
          <button type="button" class="password-toggle" id="pwd-toggle" aria-label="Toggle password">👁</button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="login-submit">Sign in</button>
    </form>

    <div class="login-divider">or</div>

    <button type="button" class="login-btn" data-google-login
            style="background:var(--black-3);color:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;">
      <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="login-footer" style="margin-bottom:14px">
      Don't have an account?
      <a href="submit-listing.html">List your business →</a>
    </div>
    <div class="login-footer">
      <a href="index.html" style="color:var(--white-30)">← Back to site</a>
    </div>

  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const next = new URLSearchParams(window.location.search).get('next');
    window.location.replace(next || 'dashboard.html');
  }

  // Password show/hide
  document.getElementById('pwd-toggle').addEventListener('click', () => {
    const input = document.getElementById('login-password');
    input.type = input.type === 'password' ? 'text' : 'password';
  });
</script>
</body>
</html>
